name: uganda_diaspora_app
description: Uganda Diaspora Official Mobile Application
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1

  # UI
  cached_network_image: ^3.3.1
  flutter_carousel_widget: ^2.2.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0

  # Web content
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.6

  # Media
  youtube_player_flutter: ^8.1.2

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  timeago: ^3.7.0
  flutter_staggered_grid_view: ^0.7.0
  permission_handler: ^11.3.1
  share_plus: ^8.0.2
  image_picker: ^1.0.7
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
