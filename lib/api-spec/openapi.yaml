          description: Post with updated likes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  # COMMENTS
  /posts/{postId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for post
      parameters:
        - { name: postId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create comment
      parameters:
        - { name: postId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /posts/{postId}/comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete comment
      parameters:
        - { name: postId, in: path, required: true, schema: { type: integer } }
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  # NOTIFICATIONS
