  /webinars/{id}:
    get:
      operationId: getWebinar
      tags: [webinars]
      summary: Get webinar
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Webinar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webinar"
        "404":
          description: Not found
    patch:
      operationId: updateWebinar
      tags: [webinars]
      summary: Update webinar
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
