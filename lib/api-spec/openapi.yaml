              schema:
                $ref: "#/components/schemas/TourismAttraction"
        "404":
          description: Not found
    patch:
      operationId: updateTourism
      tags: [tourism]
      summary: Update tourism attraction
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourismUpdate"
      responses:
        "200":
          description: Updated attraction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourismAttraction"
    delete:
      operationId: deleteTourism
      tags: [tourism]
      summary: Delete tourism attraction
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

