## Uganda Diaspora Platform — Nginx config
## Place this file at: /etc/nginx/sites-available/uganda-diaspora
## Then: ln -s /etc/nginx/sites-available/uganda-diaspora /etc/nginx/sites-enabled/
## On Arch, include sites-enabled in /etc/nginx/nginx.conf (see step 3 guide)

server {
    listen 80;
    # Replace with your domain once you have one, or leave as _ for IP-only access
    server_name _;

    # Increase body size to match API server (for news articles with images)
    client_max_body_size 10m;

    # ── Admin Dashboard (static files) ──────────────────────────────────────
    root /opt/uganda-diaspora/artifacts/admin-dashboard/dist/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Server (reverse proxy to Node) ──────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10m;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
}
